version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: aurumbank_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telegram_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aurumbank_network

  web:
    build: .
    container_name: aurumbank_web
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: telegram_bot
      TOKEN: ${TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./javascript:/app/javascript
      - ./style:/app/style
      - ./img:/app/img
    restart: unless-stopped
    networks:
      - aurumbank_network

volumes:
  postgres_data:

networks:
  aurumbank_network:
    driver: bridge