<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Аурумбанк - Главная</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" type="text/css" href="style/style.css">
   
</head>
<body>
    <div class="container">
        <!-- Шапка с логотипом -->
        <div class="header">
            <div class="logo-container">
                <div class="logo-placeholder"></div>
                <div class="bank-name">Аурумбанк</div>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="main-content">
            <div class="bank-icon fade-in">
                🏦
            </div>
            
            <div class="welcome-text fade-in">
                <h1>Добро пожаловать</h1>
                <p>Надежные банковские услуги для вашего комфорта и успеха</p>
            </div>

            <!-- Контейнер с кнопками (адаптивный) -->
            <div class="buttons-container fade-in">
                <button class="action-button" onclick="goToCredits()">
                    <span>📋 Просмотреть кредиты</span>
                    <span>→</span>
                </button>
                
                <button class="action-button" onclick="goToDeposits()">
                    <span>💰 Просмотреть вклады</span>
                    <span>→</span>
                </button>
            </div>
        </div>

        <!-- Футер -->
        <div class="footer">
            <p>© 2026 Аурумбанк. Все права защищены.</p>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Функция перехода на страницу кредитов
        function goToCredits() {
            window.location.href = 'loans.html';
        }

        // Функция перехода на страницу вкладов (создадим позже)
        function goToDeposits() {
            
             window.location.href = 'deposits.html';
        }

        // Анимация появления
        document.addEventListener('DOMContentLoaded', function() {
            const elements = document.querySelectorAll('.fade-in');
            elements.forEach((el, index) => {
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, index * 150);
            });
        });

        // Дополнительная проверка для десктопа
        function adjustFooter() {
            const footer = document.querySelector('.footer');
            const windowHeight = window.innerHeight;
            const bodyHeight = document.body.scrollHeight;
            
            if (window.innerWidth > 768 && bodyHeight < windowHeight) {
                // Если контента мало, футер и так прижат flex'ом
                console.log('Desktop view - footer adjusted');
            }
        }

        window.addEventListener('load', adjustFooter);
        window.addEventListener('resize', adjustFooter);
    </script>
    
    <script src="javascript/script.js"></script>
</body>
</html>
